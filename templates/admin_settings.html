{% extends "base.html" %}

{% block title %}Settings — VenueHR{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Venue Settings</h1>

<div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 max-w-lg">
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Venue Name</label>
            <input type="text" name="venue_name" value="{{ settings.venue_name if settings else 'Our Venue' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-rose-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Manager Phone (for alerts)</label>
            <input type="text" name="manager_phone" value="{{ settings.manager_phone if settings else '' }}"
                   placeholder="+1234567890" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-rose-500">
        </div>
        <div class="mb-4">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="tip_pool_enabled" value="1"
                       {% if settings and settings.tip_pool_enabled %}checked{% endif %}
                       class="h-4 w-4 text-rose-600 rounded">
                <span class="text-sm text-gray-700">Enable Tip Pool</span>
            </label>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipout Rate (e.g. 0.20 for 20%)</label>
            <input type="number" step="0.01" name="tipout_rate"
                   value="{{ settings.tipout_rate if settings else '0.20' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-rose-500">
        </div>
        <button type="submit" class="w-full bg-rose-600 text-white py-2 rounded-lg font-medium hover:bg-rose-700">
            Save Settings
        </button>
    </form>
</div>
{% endblock %}
