{% extends "base.html" %}

{% block title %}Admin Login — VenueHR{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">VenueHR</h1>
            <p class="text-gray-500 mt-1">Admin Portal</p>
        </div>
        <form method="POST">
            <div class="mb-6">
                <label for="pin" class="block text-sm font-medium text-gray-700 mb-2">Enter PIN</label>
                <input type="password" id="pin" name="pin" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none"
                       placeholder="••••" maxlength="20" autocomplete="off">
            </div>
            <button type="submit" class="w-full bg-rose-600 text-white py-3 rounded-lg font-medium hover:bg-rose-700 transition">
                Sign In
            </button>
        </form>
        <p class="text-xs text-gray-400 text-center mt-6">Default PIN: 1234 — change after first login</p>
    </div>
</div>
{% endblock %}
