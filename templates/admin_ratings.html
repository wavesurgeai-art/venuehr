<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Ratings — VenueHR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }
        .navbar { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 1.25rem; }
        .navbar a { color: #a78bfa; text-decoration: none; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.75rem 1rem; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 0.875rem 1rem; border-bottom: 1px solid #f3f4f6; }
        .rating-bar { display: flex; align-items: center; gap: 0.5rem; }
        .bar-bg { flex: 1; background: #e5e7eb; border-radius: 8px; height: 8px; }
        .bar-fill { background: #a78bfa; border-radius: 8px; height: 8px; }
        .empty { text-align: center; color: #9ca3af; padding: 3rem; }
        .stars { color: #f59e0b; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>⭐ Performance Ratings</h1>
        <a href="/admin">← Dashboard</a>
    </div>
    <div class="container">
        <div class="card">
            {% if ratings %}
            <table>
                <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Role</th>
                        <th>Avg Rating</th>
                        <th>Count</th>
                        <th>Trend</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in ratings %}
                    <tr>
                        <td><strong>{{ r.name }}</strong></td>
                        <td>{{ r.role }}</td>
                        <td>
                            <span class="stars">{{ '⭐' * (r.avg_rating|round|int) }}</span>
                            <strong style="margin-left:0.3rem">{{ r.avg_rating|round(1) }}/5</strong>
                        </td>
                        <td>{{ r.count }} shifts</td>
                        <td>
                            <div class="rating-bar">
                                <div class="bar-bg">
                                    <div class="bar-fill" style="width:{{ (r.avg_rating/5*100)|round|int }}%"></div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <div class="empty">
                <p>No ratings recorded yet.</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
