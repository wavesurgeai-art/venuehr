{% extends "base.html" %}

{% block title %}Edit FAQ — VenueHR{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="{{ url_for('admin_faqs') }}" class="text-sm text-gray-500 hover:text-gray-700">← Back to FAQs</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-2">Edit FAQ</h1>
</div>

<div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 max-w-2xl">
    <form method="POST">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                <input type="text" name="category" value="{{ faq.category }}" list="categories" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500">
                <datalist id="categories">
                    {% for cat in categories %}
                    <option value="{{ cat }}">
                    {% endfor %}
                </datalist>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Question *</label>
                <input type="text" name="question" value="{{ faq.question }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Answer *</label>
                <textarea name="answer" rows="4" required
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500">{{ faq.answer }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Keywords (comma-separated, for SMS matching) *</label>
                <input type="text" name="keywords" value="{{ faq.keywords }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500">
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button type="submit" class="bg-rose-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-rose-700">Save Changes</button>
            <a href="{{ url_for('admin_faqs') }}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-300">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
